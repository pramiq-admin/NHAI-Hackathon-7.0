name: nhai_face_auth
description: "NHAI Face Authentication - On-device AI face recognition for highway worker attendance"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.12.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.8.0
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.4
  go_router: ^17.2.3
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.1.1
  geolocator: ^14.0.0
  permission_handler: ^12.0.2
  intl: ^0.20.2
  flutter_tts: ^4.2.0
  crypto: ^3.0.6
  pointycastle: ^4.0.0
  uuid: ^4.5.1
  image: ^4.5.3
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/i18n/

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: fonts/NotoSansDevanagari-Regular.ttf
        - asset: fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
